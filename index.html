    <style>
        :root {
            --primary: #9D4EDD;
            --primary-light: #C799FF;
            --accent: #A1FAFF;
            --bg-dark: #000000;
            --surface: #180720;
            --surface-container: #1E0B27;
            --text-main: #F8DCFF;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Manrope', sans-serif;
            scroll-behavior: smooth;
        }

        .font-space { font-family: 'Space Grotesk', sans-serif; }

        .glass-nav {
            background: rgba(24, 7, 32, 0.8);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(85, 64, 93, 0.15);
        }

        .gradient-text {
            background: linear-gradient(135deg, #F8DCFF 0%, #C799FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-primary {
            background-color: var(--primary-light);
            color: #180720;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(157, 78, 221, 0.3);
        }

        .card {
            background-color: var(--surface);
            border: 1px solid rgba(85, 64, 93, 0.2);
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .highlight-card {
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(157, 78, 221, 0.15);
        }

        input, textarea {
            background: rgba(24, 7, 32, 0.5);
            border: 1px solid rgba(85, 64, 93, 0.4);
            color: var(--text-main);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(24, 7, 32, 0.8);
        }

        .content-container {
            max-width: 1280px;
            margin: 0 auto;
            width: 100%;
        }

        /* Top 버튼 스타일 */
        #topBtn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            padding: 12px 18px;
            border-radius: 50px;
            border: none;
            box-shadow: 0 4px 15px rgba(157, 78, 221, 0.4);
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            font-weight: bold;
        }
        #topBtn.show {
            opacity: 1;
            visibility: visible;
        }
    </style>
